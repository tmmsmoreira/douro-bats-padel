<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Douro Bats Padel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: #f3f4f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    h1 {
      color: #1f2937;
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .retry-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .features {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #e5e7eb;
    }

    .features h2 {
      color: #1f2937;
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .feature-list {
      text-align: left;
      color: #6b7280;
      font-size: 14px;
      line-height: 2;
    }

    .feature-list li {
      list-style: none;
      padding-left: 24px;
      position: relative;
    }

    .feature-list li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📡
    </div>

    <h1 data-i18n="title">You're Offline</h1>

    <p data-i18n="description">
      It looks like you've lost your internet connection.
      Please check your network and try again.
    </p>

    <button class="retry-btn" onclick="window.location.reload()" data-i18n="retry">
      Try Again
    </button>

    <div class="features">
      <h2 data-i18n="featuresHeading">When you're back online, you can:</h2>
      <ul class="feature-list">
        <li data-i18n="feature1">View upcoming padel events</li>
        <li data-i18n="feature2">RSVP to game nights</li>
        <li data-i18n="feature3">Check the leaderboard</li>
        <li data-i18n="feature4">View match draws and results</li>
        <li data-i18n="feature5">Update your profile</li>
      </ul>
    </div>
  </div>

  <script>
    // Keep this inline + tiny: the offline page is served by the service
    // worker and cannot fetch any other resources. Strings mirror keys used
    // in apps/web/src/i18n/dictionaries so copy stays consistent.
    var messages = {
      en: {
        title: "You're Offline",
        description: "It looks like you've lost your internet connection. Please check your network and try again.",
        retry: 'Try Again',
        featuresHeading: "When you're back online, you can:",
        feature1: 'View upcoming padel events',
        feature2: 'RSVP to game nights',
        feature3: 'Check the leaderboard',
        feature4: 'View match draws and results',
        feature5: 'Update your profile',
      },
      pt: {
        title: 'Estás Offline',
        description: 'Parece que perdeste a ligação à internet. Por favor, verifica a tua rede e tenta novamente.',
        retry: 'Tentar Novamente',
        featuresHeading: 'Quando voltares a estar online, podes:',
        feature1: 'Ver próximos eventos de padel',
        feature2: 'Inscrever-te em noites de jogo',
        feature3: 'Consultar o ranking',
        feature4: 'Ver sorteios e resultados',
        feature5: 'Atualizar o teu perfil',
      },
    };

    // Prefer the locale encoded in the URL path (e.g. /pt/events) — that's the
    // page the user was trying to reach. Fall back to the browser language.
    function detectLocale() {
      var pathLocale = (location.pathname.split('/')[1] || '').toLowerCase();
      if (messages[pathLocale]) return pathLocale;
      var browser = (navigator.language || 'en').slice(0, 2).toLowerCase();
      return messages[browser] ? browser : 'en';
    }

    var locale = detectLocale();
    var copy = messages[locale];
    document.documentElement.lang = locale;
    document.title = copy.title + ' - Douro Bats Padel';
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (copy[key]) el.textContent = copy[key];
    });

    window.addEventListener('online', function () {
      window.location.reload();
    });

    if (navigator.onLine) {
      window.location.reload();
    }
  </script>
</body>
</html>
