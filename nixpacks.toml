[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "find -L node_modules/.bin apps/*/node_modules/.bin packages/*/node_modules/.bin -maxdepth 1 -type f -exec chmod +x {} + 2>/dev/null || true"
]

[phases.build]
cmd = "pnpm --filter @padel/types build && pnpm --filter @padel/api build"

[start]
cmd = "chmod +x apps/api/scripts/migrate-and-start.sh && bash apps/api/scripts/migrate-and-start.sh"

