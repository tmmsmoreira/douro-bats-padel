[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "find node_modules/.pnpm -type f -exec chmod +x {} + 2>/dev/null || true"
]

[phases.build]
cmd = "find node_modules/.pnpm -type f -exec chmod +x {} + 2>/dev/null || true && pnpm --filter @padel/types build && pnpm --filter @padel/api build"

[start]
cmd = "chmod +x apps/api/scripts/migrate-and-start.sh && bash apps/api/scripts/migrate-and-start.sh"

